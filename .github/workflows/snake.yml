# ════════════════════════════════════════════════════════════════
# GitHub Actions Workflow: Contribution Snake Animation
# ════════════════════════════════════════════════════════════════
#
# 📌 SETUP INSTRUCTIONS:
#
#  1. In your GitHub profile repo (Maheesh09/Maheesh09), create:
#       .github/workflows/snake.yml
#     and paste this entire file into it.
#
#  2. Commit & push.
#
#  3. Go to Actions tab → run "Generate Snake" workflow manually
#     (click "Run workflow") to generate the first animation.
#
#  4. After it runs, your snake SVGs will be pushed to the
#     `output` branch. The README.md already references them! ✅
#
#  5. It will auto-update every 12 hours going forward. 🎉
# ════════════════════════════════════════════════════════════════

name: Generate Snake Animation

on:
  schedule:
    # Runs every 12 hours (midnight & noon UTC)
    - cron: "0 */12 * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

  # Also regenerate when you push to main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Snake (Light & Dark Mode)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Push output to `output` branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
